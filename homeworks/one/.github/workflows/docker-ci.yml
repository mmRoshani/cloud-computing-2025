name: CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: windows-latest  # Use Windows environment for CI

    steps:
    # Step 1: Checkout code
    - name: Checkout repository
      uses: actions/checkout@v2

    # Step 2: Set up Docker Buildx
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v1

    # Step 3: Log in to Docker Hub
    - name: Log in to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_HUB_USERNAME }}
        password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

    # Step 4: Build Docker Image
    - name: Build Docker image
      run: |
        docker build -t sepassetayesh/llm-inference-image .

    # Step 5: Push Docker Image to Docker Hub
    - name: Push Docker image
      run: |
        docker push sepassetayesh/llm-inference-image

    # Optional: Step 6 - Testing (Not included, as per your request)
    # - name: Run tests
    #   run: |
    #     echo "Run tests here"
